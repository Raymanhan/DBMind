name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            arch: arm64
          - os: macos-latest
            target: mac
            arch: x64
          - os: windows-latest
            target: win
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p upload
          find release -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) -exec cp {} upload/ \;
          ls -lh upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbmind-${{ matrix.target }}-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    name: Publish to Public Repo
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dbmind-*
          merge-multiple: true

      - name: Show artifacts
        run: ls -lh artifacts/

      - name: Checkout (for version)
        uses: actions/checkout@v4

      - name: Publish Release
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "Publishing $VERSION to Raymanhan/DBMind..."

          if gh release view "$VERSION" --repo Raymanhan/DBMind > /dev/null 2>&1; then
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" artifacts/* --repo Raymanhan/DBMind --clobber
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" artifacts/* \
              --repo Raymanhan/DBMind \
              --title "DBMind $VERSION" \
              --notes "Automated build. See [releases](https://github.com/Raymanhan/DBMind/releases) for details." \
              --draft=false
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
