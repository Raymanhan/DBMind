name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.4)'
        required: true
        default: 'v0.2.4'

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build & Bundle with Tauri
        run: npx tauri build --target ${{ matrix.target }}

      - name: List bundle output (debug)
        shell: bash
        run: |
          echo "=== Bundle files for ${{ matrix.target }} ==="
          find src-tauri/target -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \) 2>/dev/null || echo "No bundle files found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: warn

  publish:
    name: Publish to Public Repo
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List and flatten artifacts
        shell: bash
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | head -30
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release/ \;

      - name: Rename packages
        shell: bash
        run: |
          cd release
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Version: $VERSION"

          # macOS ARM
          for f in *_aarch64.dmg; do
            [ -f "$f" ] && mv "$f" "DBMind_${VERSION}_macos_arm64.dmg"
          done
          # macOS Intel
          for f in *_x64.dmg; do
            [ -f "$f" ] && mv "$f" "DBMind_${VERSION}_macos_intel.dmg"
          done

          if gh release view "$VERSION" --repo Raymanhan/DBMind > /dev/null 2>&1; then
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" "${FILES[@]}" --repo Raymanhan/DBMind --clobber
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" "${FILES[@]}" \
              --repo Raymanhan/DBMind \
              --title "DBMind $VERSION" \
              --notes "## DBMind $VERSION

          ### Downloads
          - **macOS**: \`DBMind_${VERSION}_macos_arm64.dmg\` (Apple Silicon) or \`DBMind_${VERSION}_macos_intel.dmg\` (Intel)
          - **Windows**: `DBMind_${VERSION}_windows_x64.msi`
          - **Linux**: \`DBMind_${VERSION}_linux_x64.AppImage\` or \`DBMind_${VERSION}_linux_amd64.deb\`

          > Built automatically by CI from source." \
              --target main \
              --latest
          fi

          # Remove auto-generated source code archives
          echo "Removing source code archives..."
          ASSET_IDS=$(gh api "repos/Raymanhan/DBMind/releases/tags/$VERSION" --jq '.assets[] | select(.name | test("Source code")) | .id') || true
          for id in $ASSET_IDS; do
            echo "  Deleting source asset $id..."
            gh api --silent -X DELETE "repos/Raymanhan/DBMind/releases/assets/$id" || true
          done
          echo "Done."
