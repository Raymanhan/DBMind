name: Build (Tauri v2) & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            label: macOS Universal (Intel + Apple Silicon)
            bundle_ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
            bundle_ext: 'msi exe'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux x64
            bundle_ext: 'AppImage deb'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build frontend
        run: npm run build

      - name: Build & Bundle with Tauri
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect bundle artifact
        shell: bash
        run: |
          mkdir -p upload
          # Search for bundles in target directory
          for ext in ${{ matrix.bundle_ext }}; do
            find target -name "*.${ext}" -exec cp {} upload/ \; 2>/dev/null || true
          done
          ls -lh upload/

      - name: Rename bundle consistently
        shell: bash
        run: |
          cd upload
          tag="${{ github.ref_name }}"
          for f in *; do
            [ ! -f "$f" ] && continue
            ext="${f##*.}"
            case "$ext" in
              dmg)      mv "$f" "DBMind_${tag}_macos_universal.dmg" 2>/dev/null || true ;;
              exe)      mv "$f" "DBMind_${tag}_windows_x64.exe" 2>/dev/null || true ;;
              msi)      mv "$f" "DBMind_${tag}_windows_x64.msi" 2>/dev/null || true ;;
              AppImage) mv "$f" "DBMind_${tag}_linux_x86_64.AppImage" 2>/dev/null || true ;;
              deb)      mv "$f" "DBMind_${tag}_linux_x86_64.deb" 2>/dev/null || true ;;
            esac
          done
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbmind-${{ matrix.label }}
          path: upload/*
          if-no-files-found: warn

  publish:
    name: Publish to Public Repo
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: Raymanhan/DBMind
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \) -exec mv {} . \;
          ls -lh *.dmg *.exe *.msi *.AppImage *.deb 2>/dev/null || echo "No packages found"

      - name: Publish Release & Remove Source Archives
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          echo "Publishing $VERSION to Raymanhan/DBMind..."

          mapfile -t FILES < <(find . -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \))
          echo "Found ${#FILES[@]} package(s):"
          printf '  %s\n' "${FILES[@]}"

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "::error::No release packages found."
            exit 1
          fi

          if gh release view "$VERSION" --repo Raymanhan/DBMind > /dev/null 2>&1; then
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" "${FILES[@]}" --repo Raymanhan/DBMind --clobber
            gh release edit "$VERSION" --repo Raymanhan/DBMind --notes "Auto-built by CI" --latest
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" "${FILES[@]}" \
              --repo Raymanhan/DBMind \
              --title "DBMind $VERSION" \
              --notes "Auto-built by CI" \
              --target main \
              --latest \
              --draft=false
          fi

          # Remove source code archives attached by GitHub automatically
          echo "Removing source code archives..."
          ASSET_IDS=$(gh api "repos/Raymanhan/DBMind/releases/tags/$VERSION" --jq '.assets[] | select(.name | test("Source code")) | .id')
          for id in $ASSET_IDS; do
            echo "  Deleting source asset $id..."
            gh api --silent -X DELETE "repos/Raymanhan/DBMind/releases/assets/$id"
          done
          echo "Done."
