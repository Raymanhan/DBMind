name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.2.3. Leave empty to read package.json from the selected ref.'
        required: false
        type: string
      release_notes:
        description: 'Required for manual releases unless docs/releases/<version>.md exists.'
        required: false
        type: string

jobs:
  prepare:
    name: Prepare release metadata
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      notes: ${{ steps.meta.outputs.notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          fetch-depth: 0

      - name: Resolve version and release notes
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must use vx.y.z format, got $VERSION"
            exit 1
          fi

          NOTES_FILE="docs/releases/${VERSION}.md"
          if [[ -n "$INPUT_RELEASE_NOTES" ]]; then
            printf '%s\n' "$INPUT_RELEASE_NOTES" > release-notes.md
          elif [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" release-notes.md
          else
            echo "::error::Missing release notes. Add $NOTES_FILE or provide workflow_dispatch release_notes."
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "notes<<EOF"
            cat release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }} (${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            arch: arm64
          - os: macos-latest
            target: mac
            arch: x64
          - os: windows-latest
            target: win
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p upload
          find release -type f \( -name '*.dmg' -o -name '*.AppImage' -o \( -name '*.exe' -a -name '*Setup*' \) \) -exec cp {} upload/ \;
          ls -lh upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbmind-${{ matrix.target }}-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    name: Publish to Public Repo
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f \( -name '*.dmg' -o -name '*.AppImage' -o \( -name '*Setup*.exe' \) \) -exec mv {} . \;
          ls -lh *.dmg *Setup*.exe *.AppImage 2>/dev/null

      - name: Publish Release & Remove Source Archives
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Publishing $VERSION to Raymanhan/DBMind..."

          printf '%s\n' "$RELEASE_NOTES" > release-notes.md

          # Collect all package files
          mapfile -t FILES < <(find . -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \))
          echo "Found ${#FILES[@]} package(s):"
          printf '  %s\n' "${FILES[@]}"

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "::error::No release packages found."
            exit 1
          fi

          if gh release view "$VERSION" --repo Raymanhan/DBMind > /dev/null 2>&1; then
            echo "Release $VERSION exists, uploading assets..."
            gh release upload "$VERSION" "${FILES[@]}" --repo Raymanhan/DBMind --clobber
            gh release edit "$VERSION" --repo Raymanhan/DBMind --notes-file release-notes.md --latest
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" "${FILES[@]}" \
              --repo Raymanhan/DBMind \
              --title "DBMind $VERSION" \
              --notes-file release-notes.md \
              --target main \
              --latest \
              --draft=false
          fi

          # GitHub automatically attaches Source code archives to every Release.
          # Delete them since the source is in a private repo.
          echo "Removing source code archives..."
          ASSET_IDS=$(gh api "repos/Raymanhan/DBMind/releases/tags/$VERSION" --jq '.assets[] | select(.name | test("Source code")) | .id')
          for id in $ASSET_IDS; do
            echo "  Deleting source asset $id..."
            gh api --silent -X DELETE "repos/Raymanhan/DBMind/releases/assets/$id"
          done
          echo "Done."
